name: update readme stats cards

on:
  schedule:
    - cron: "0 3 * * *"   # once a day at 3am
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=tokyonight&hide_border=true&bg_color=1a1b27
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&theme=tokyonight&hide_border=true&bg_color=1a1b27
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: generate streak stats card
        uses: DenverCoder1/github-readme-streak-stats@main
        with:
          options: user=${{ github.repository_owner }}&theme=tokyonight&hide_border=true&background=1A1B27
          path: profile/streak.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "update stats cards" || exit 0
          git push
